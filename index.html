<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Formulário de Cadastro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Cadastro de Usuário</h1>

<form id="formCadastro">

<label>Nome</label>
<input type="text" id="nome" placeholder="Digite seu Nome">

<label>Apelido</label>
<input type="text" id="apelido" placeholder="Digite seu Apelido">

<label>Email</label>
<input type="email" id="email" placeholder="Digite seu email">
  
<!--
<label>Idade</label>
<input type="number" id="idade" placeholder="Digite sua data de nascimento">
-->

<label>Data de Nascimento</label>
<input type="date" id= "data" placeholder= "Digite sua data de Nascimento">

<label>Senha</label>
<input type="password" id="senha" placeholder="Digite uma senha">
  
<label>Confirmar senha</label>
<input type="password" id="confirmarSenha" placeholder="Repita a senha">

<button type="submit">Cadastrar</button>

<p id="mensagem"></p>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
